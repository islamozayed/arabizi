<!DOCTYPE html>
<html lang="ar" dir="ltr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arabizi</title>
  <style>
    /* === Font Faces === */
    @font-face {
      font-family: 'Manrope';
      src: url('fonts/Manrope-VariableFont_wght.ttf') format('truetype');
      font-weight: 200 800;
      font-style: normal;
      font-display: swap;
    }
    @font-face { font-family: 'Rubik'; src: url('fonts/Rubik-Regular.ttf') format('truetype'); font-weight: 400; font-display: swap; }
    @font-face { font-family: 'Rubik'; src: url('fonts/Rubik-Medium.ttf') format('truetype'); font-weight: 500; font-display: swap; }
    @font-face { font-family: 'Rubik'; src: url('fonts/Rubik-SemiBold.ttf') format('truetype'); font-weight: 600; font-display: swap; }
    @font-face { font-family: 'Rubik'; src: url('fonts/Rubik-Bold.ttf') format('truetype'); font-weight: 700; font-display: swap; }

    /* === Theme Variables === */
    :root {
      --font: 'Manrope', system-ui, sans-serif;
      --font-ar: 'Rubik', 'Segoe UI', 'Noto Sans Arabic', 'Tahoma', sans-serif;
      --accent: #58A1AC;
      --accent-translucent: rgba(88, 161, 172, 0.4);
      --radius: 8px;
    }

    [data-theme="dark"] {
      --bg-surface: rgba(33, 33, 33, 0.6);
      --outline: #717171;
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.6);
      --text-tertiary: rgba(255, 255, 255, 0.4);
      --hint-example-bg: rgba(88, 161, 172, 0.4);
      --hint-example-outline: rgba(255, 255, 255, 0.2);
      --kbd-bg: rgba(255, 255, 255, 0.1);
      --kbd-border: #717171;
      --icon-fill: #E3E3E3;
      --icon-fill-muted: #9C9C9C;
      --item-hover: rgba(255, 255, 255, 0.06);
      --mapping-bg: rgba(255, 255, 255, 0.03);
      --scrollbar-thumb: rgba(255, 255, 255, 0.1);
    }

    [data-theme="light"] {
      --bg-surface: rgba(245, 245, 245, 0.6);
      --outline: #c8c8c8;
      --text-primary: #1a1a1a;
      --text-secondary: rgba(0, 0, 0, 0.55);
      --text-tertiary: rgba(0, 0, 0, 0.35);
      --hint-example-bg: rgba(88, 161, 172, 0.18);
      --hint-example-outline: rgba(0, 0, 0, 0.1);
      --kbd-bg: rgba(0, 0, 0, 0.06);
      --kbd-border: #c8c8c8;
      --icon-fill: #333333;
      --icon-fill-muted: #666666;
      --item-hover: rgba(0, 0, 0, 0.04);
      --mapping-bg: rgba(0, 0, 0, 0.04);
      --scrollbar-thumb: rgba(0, 0, 0, 0.12);
    }

    /* === Reset === */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font);
      background: transparent;
      overflow: hidden;
      user-select: none;
      -webkit-font-smoothing: antialiased;
    }

    /* === Flyout === */
    .flyout {
      display: flex;
      flex-direction: column;
      height: 100vh;
      border-radius: var(--radius);
      overflow: hidden;
    }

    /* === Header === */
    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 12px;
      height: 60px;
      background: var(--bg-surface);
      outline: 1px solid var(--outline);
      backdrop-filter: blur(50px);
      flex-shrink: 0;
      border-radius: var(--radius) var(--radius) 0 0;
    }

    .logo { flex-shrink: 0; }
    .logo svg { width: 24px; height: auto; fill: var(--icon-fill-muted); }

    .input-wrapper {
      position: relative;
      flex: 1;
      display: flex;
      align-items: center;
      height: 28px;
    }

    #arabizi-input {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-primary);
      font: 500 16px/20px var(--font);
      z-index: 1;
      caret-color: var(--accent);
    }

    .input-hint {
      display: flex;
      align-items: center;
      gap: 6px;
      pointer-events: none;
      white-space: nowrap;
      overflow: hidden;
    }

    .hint-text {
      color: var(--text-secondary);
      font: 16px/20px var(--font);
    }

    .hint-example {
      display: inline-flex;
      padding: 4px 6px;
      background: var(--hint-example-bg);
      outline: 1px solid var(--hint-example-outline);
      border-radius: 4px;
      color: var(--text-primary);
      font: 16px/20px sans-serif;
      cursor: pointer;
      pointer-events: auto;
      z-index: 2;
      position: relative;
      transition: background 0.1s;
    }

    .hint-example:hover {
      background: var(--accent-translucent);
    }

    /* === Content Area === */
    .content {
      flex: 1;
      display: flex;
      min-height: 0;
    }

    .panel {
      display: flex;
      flex-direction: column;
      background: var(--bg-surface);
      outline: 1px solid var(--outline);
      backdrop-filter: blur(50px);
      padding: 12px;
    }

    .panel-label {
      color: var(--text-secondary);
      font: 12px/16px var(--font);
      flex-shrink: 0;
    }

    /* Tips panel (landing) */
    .tips-panel {
      flex: 1;
      gap: 4px;
      overflow-y: auto;
    }

    .mapping-section-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 8px;
    }

    .mapping-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px 8px;
      margin-top: 4px;
    }

    .mapping-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 10px;
      border-radius: 5px;
      background: var(--mapping-bg);
    }

    .mapping-key {
      font: 600 13px var(--font);
      color: var(--accent);
      min-width: 22px;
    }

    .mapping-arrow {
      font-size: 10px;
      color: var(--text-tertiary);
      margin: 0 6px;
    }

    .mapping-val {
      font: 17px var(--font-ar);
      color: var(--text-primary);
    }

    /* Typing panels (suggestions + preview) */
    .typing-panels {
      display: flex;
      flex: 1;
    }

    .suggestions-panel {
      width: 142px;
      flex-shrink: 0;
      gap: 10px;
      overflow-y: auto;
    }

    .suggestion-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .suggestion {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      padding: 4px;
      border-radius: 2px;
      cursor: pointer;
      transition: background 0.06s;
    }

    .suggestion:hover { background: var(--item-hover); }

    .suggestion.selected {
      background: var(--accent);
      outline: 1px solid var(--hint-example-outline);
    }

    .suggestion.selected .ar { color: #fff; }

    .suggestion .ar {
      font: 16px/20px var(--font-ar);
      color: var(--text-primary);
      direction: rtl;
      text-align: right;
      width: 100%;
    }

    .preview-panel {
      flex: 1;
      gap: 10px;
    }

    .preview-text {
      font: 32px/40px var(--font-ar);
      color: var(--text-primary);
      direction: rtl;
      text-align: right;
      padding: 4px;
    }

    .preview-text .committed-word {
      cursor: pointer;
      border-radius: 4px;
      padding: 0 4px;
      transition: background 0.08s;
    }

    .preview-text .committed-word:hover { background: var(--item-hover); }
    .preview-text .committed-word.editing { background: var(--accent-translucent); }

    .preview-committed-hint {
      font: 12px/16px var(--font);
      color: var(--text-tertiary);
      text-align: center;
      margin-top: auto;
      padding: 8px;
    }

    /* Settings panel */
    .settings-panel {
      flex: 1;
      gap: 8px;
    }

    .settings-section { margin-top: 8px; }

    .settings-section-label {
      font: 600 11px var(--font);
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .theme-buttons {
      display: flex;
      gap: 4px;
    }

    .theme-btn {
      flex: 1;
      padding: 6px 12px;
      border: 1px solid var(--outline);
      border-radius: 4px;
      background: transparent;
      color: var(--text-secondary);
      font: 500 12px var(--font);
      cursor: pointer;
      transition: all 0.1s;
    }

    .theme-btn:hover { background: var(--item-hover); }

    .theme-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 0;
    }

    .toggle-label {
      font: 13px var(--font);
      color: var(--text-secondary);
    }

    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      background: var(--kbd-bg);
      border: 1px solid var(--outline);
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }

    .toggle.on {
      background: var(--accent);
      border-color: var(--accent);
    }

    .toggle::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 14px;
      height: 14px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.15s;
    }

    .toggle.on::after { transform: translateX(16px); }

    /* === Footer === */
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      background: var(--bg-surface);
      outline: 1px solid var(--outline);
      backdrop-filter: blur(50px);
      flex-shrink: 0;
      border-radius: 0 0 var(--radius) var(--radius);
    }

    .shortcuts { display: flex; gap: 12px; }

    .shortcut { display: flex; align-items: center; gap: 4px; }

    .shortcut-keys { display: flex; gap: 3px; }

    kbd {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 20px;
      height: 20px;
      padding: 0 4px;
      background: var(--kbd-bg);
      border: 1px solid var(--kbd-border);
      border-radius: 4px;
      font: 10px/12px sans-serif;
      color: var(--icon-fill);
    }

    kbd svg { width: 16px; height: 16px; flex-shrink: 0; }

    .shortcut-label {
      color: var(--text-tertiary);
      font: 11px/14px var(--font);
      white-space: nowrap;
    }

    .settings-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      transition: opacity 0.1s;
    }

    .settings-btn svg {
      width: 20px;
      height: 20px;
      fill: var(--icon-fill);
      transition: fill 0.1s;
    }

    .settings-btn:hover svg { fill: var(--accent); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 2px; }

    /* Blur toggle */
    [data-blur="false"] .header,
    [data-blur="false"] .panel,
    [data-blur="false"] .footer {
      backdrop-filter: none;
    }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 56px;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: var(--bg-surface);
      outline: 1px solid var(--outline);
      backdrop-filter: blur(50px);
      color: var(--text-secondary);
      font: 11px/14px var(--font);
      padding: 6px 12px;
      border-radius: 4px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 100;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast kbd {
      vertical-align: middle;
      margin: 0 2px;
    }

    .hidden { display: none !important; }
  </style>
</head>

        <div class="mapping-grid">
          <div class="mapping-item"><span class="mapping-key">sh</span><span class="mapping-arrow">→</span><span class="mapping-val">ش</span></div>
          <div class="mapping-item"><span class="mapping-key">kh</span><span class="mapping-arrow">→</span><span class="mapping-val">خ</span></div>

          <div class="mapping-item"><span class="mapping-key">th</span><span class="mapping-arrow">→</span><span class="mapping-val">ث</span></div>

          <div class="mapping-item"><span class="mapping-key">3'</span><span class="mapping-arrow">→</span><span class="mapping-val">غ</span></div>
        </div>
      </div>

      <!-- Typing: Suggestions + Preview -->
      <div class="typing-panels hidden" id="typing-panels">
        <div class="panel suggestions-panel">
          <div class="panel-label">Suggestions</div>

        </div>
        <div class="panel preview-panel">

      <!-- Settings -->
      <div class="panel settings-panel hidden" id="settings-panel">

    <!-- Footer -->
    <div class="footer" data-tauri-drag-region>

      </button>
    </div>
  </div>

  <script>
    const { invoke } = window.__TAURI__.core;
    const { writeText } = window.__TAURI__.clipboardManager;
    const { getCurrentWindow } = window.__TAURI__.window;

    // DOM refs
    const inputEl = document.getElementById('arabizi-input');
    const inputHint = document.getElementById('input-hint');
    const tipsPanel = document.getElementById('tips-panel');
    const typingPanels = document.getElementById('typing-panels');
    const settingsPanel = document.getElementById('settings-panel');
    const suggestionList = document.getElementById('suggestion-list');
    const previewText = document.getElementById('preview-text');
    const settingsBtn = document.getElementById('settings-btn');
    const blurToggle = document.getElementById('blur-toggle');
    const themeButtons = document.getElementById('theme-buttons');

    // ── State ──
    let committedWords = [];
    let currentCandidates = [];
    let currentInput = '';
    let selectedIdx = 0;
    let editingWordIdx = -1;
    let settingsOpen = false;

    // ── Settings ──
    const settings = {
      theme: localStorage.getItem('arabizi-theme') || 'system',
      blur: localStorage.getItem('arabizi-blur') !== 'false',
    };

    function resolveIsDark() {
      if (settings.theme === 'dark') return true;
      if (settings.theme === 'light') return false;
      return window.matchMedia('(prefers-color-scheme: dark)').matches;
    }

    function applyTheme() {
      const dark = resolveIsDark();
      document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-blur', settings.blur);
      invoke('apply_theme', { dark });
      // Update button states
      themeButtons.querySelectorAll('.theme-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.val === settings.theme);
      });
      blurToggle.classList.toggle('on', settings.blur);
    }

    function setTheme(theme) {
      settings.theme = theme;
      localStorage.setItem('arabizi-theme', theme);
      applyTheme();
    }

    function toggleBlur() {
      settings.blur = !settings.blur;
      localStorage.setItem('arabizi-blur', settings.blur);
      applyTheme();
    }

    // System accent color detection (via Rust registry read)
    async function initAccentColor() {
      try {
        const hex = await invoke('get_accent_color');
        if (hex && hex !== '#58A1AC') {
          const r = parseInt(hex.slice(1, 3), 16);
          const g = parseInt(hex.slice(3, 5), 16);
          const b = parseInt(hex.slice(5, 7), 16);
          document.documentElement.style.setProperty('--accent', hex);
          document.documentElement.style.setProperty('--accent-translucent', `rgba(${r},${g},${b},0.4)`);
          document.documentElement.style.setProperty('--hint-example-bg', `rgba(${r},${g},${b},0.4)`);
        }
      } catch(e) { /* fallback to default accent */ }
    }

    // Listen for system theme changes
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
      if (settings.theme === 'system') applyTheme();
    });

    // Event listeners for settings
    themeButtons.addEventListener('click', (e) => {
      const btn = e.target.closest('.theme-btn');
      if (btn) setTheme(btn.dataset.val);
    });
    blurToggle.addEventListener('click', toggleBlur);
    settingsBtn.addEventListener('click', () => {
      settingsOpen = !settingsOpen;
      renderAll();
      if (!settingsOpen) inputEl.focus();
    });

    // ── Hint example click ──
    document.getElementById('hint-example').addEventListener('click', async (e) => {
      e.stopPropagation();
      const text = 'ahlan wa sahlan';
      inputEl.value = text;
      updateInputHint();
      currentInput = text;
      const result = await invoke('transliterate', { input: currentInput });
      if (result.words.length > 0) {
        // Auto-commit all words except the last, show last in suggestions
        while (result.words.length > 1) {
          const w = result.words.shift();
          committedWords.push({
            input: w.input,
            arabic: w.candidates[0] || '',
            candidates: w.candidates,
          });
        }
        const lastWord = result.words[result.words.length - 1];
        currentCandidates = lastWord.candidates;
        currentInput = lastWord.input;
      }
      selectedIdx = 0;
      renderAll();
      inputEl.focus();
    });

    // ── Toast ──
    const toastEl = document.getElementById('toast');
    let toastTimer;
    function showToast(html, duration = 3000) {
      toastEl.innerHTML = html;
      toastEl.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), duration);
    }

    // ── Backspace counter for Ctrl+Backspace hint ──
    let backspaceCount = 0;
    let backspaceHintShown = localStorage.getItem('arabizi-ctrlbs-hint') === 'true';

    // ── Show/reset ──
    getCurrentWindow().listen('focus-input', () => {
      committedWords = [];
      currentCandidates = [];
      currentInput = '';
      selectedIdx = 0;
      editingWordIdx = -1;
      settingsOpen = false;
      inputEl.value = '';
      renderAll();
      setTimeout(() => inputEl.focus(), 50);
    });

    // ── Input handler ──
    let debounce;
    inputEl.addEventListener('input', () => {
      updateInputHint();
      clearTimeout(debounce);
      debounce = setTimeout(async () => {
        const raw = inputEl.value;
        currentInput = raw.trim();

        if (!currentInput) {
          currentCandidates = [];
          selectedIdx = 0;
          renderAll();
          return;
        }

        const result = await invoke('transliterate', { input: currentInput });
        if (result.words.length > 0) {
          if (editingWordIdx < 0) {
            while (result.words.length > 1) {
              const w = result.words.shift();
              committedWords.push({
                input: w.input,
                arabic: w.candidates[0] || '',
                candidates: w.candidates,
              });
            }
          }
          const lastWord = result.words[result.words.length - 1];
          currentCandidates = lastWord.candidates;
          currentInput = lastWord.input;
        } else {
          currentCandidates = [];
        }
        selectedIdx = 0;
        renderAll();
      }, 30);
    });

    // ── Keyboard ──
    inputEl.addEventListener('keydown', async (e) => {
      if (e.key === 'Escape') {
        e.preventDefault();
        if (settingsOpen) {
          settingsOpen = false;
          renderAll();
          inputEl.focus();
        } else if (editingWordIdx >= 0) {
          editingWordIdx = -1;
          inputEl.value = '';
          currentCandidates = [];
          currentInput = '';
          updateInputHint();
          renderAll();
        } else {
          getCurrentWindow().hide();
        }
        return;
      }

      if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (currentCandidates.length > 0) {
          selectedIdx = Math.min(selectedIdx + 1, currentCandidates.length - 1);
          renderSuggestions();
          renderPreview();
        }
        return;
      }

      if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (currentCandidates.length > 0) {
          selectedIdx = Math.max(selectedIdx - 1, 0);
          renderSuggestions();
          renderPreview();
        }
        return;
      }

      if (e.key === ' ' && currentCandidates.length > 0 && currentInput) {
        e.preventDefault();
        confirmCurrentWord();
        return;
      }

      if (e.key === 'Tab' && currentInput) {
        e.preventDefault();
        const raw = currentInput;
        if (editingWordIdx >= 0) {
          committedWords[editingWordIdx] = { input: raw, arabic: raw, candidates: [raw] };
          editingWordIdx = -1;
        } else {
          committedWords.push({ input: raw, arabic: raw, candidates: [raw] });
        }
        inputEl.value = '';
        currentInput = '';
        currentCandidates = [];
        selectedIdx = 0;
        updateInputHint();
        renderAll();
        inputEl.focus();
        return;
      }

      if (e.key === 'Enter') {
        e.preventDefault();
        if (currentCandidates.length > 0 && currentInput) {
          confirmCurrentWord();
        }
        if (committedWords.length > 0) {
          await commitAll();
        }
        return;
      }

      // Ctrl+Backspace = delete entire committed word
      if (e.key === 'Backspace' && e.ctrlKey && committedWords.length > 0) {
        e.preventDefault();
        if (editingWordIdx >= 0) {
          committedWords.splice(editingWordIdx, 1);
          editingWordIdx = -1;
        } else {
          committedWords.pop();
        }
        inputEl.value = '';
        currentInput = '';
        currentCandidates = [];
        selectedIdx = 0;
        backspaceCount = 0;
        updateInputHint();
        renderAll();
        inputEl.focus();
        return;
      }

      // Backspace on empty input = edit previous word
      if (e.key === 'Backspace' && inputEl.value === '' && committedWords.length > 0 && editingWordIdx < 0) {
        e.preventDefault();
        editWord(committedWords.length - 1);
        return;
      }

      // Track consecutive backspaces to hint about Ctrl+Backspace
      if (e.key === 'Backspace' && !e.ctrlKey && inputEl.value.length > 0) {
        backspaceCount++;
        if (backspaceCount >= 3 && !backspaceHintShown) {
          backspaceHintShown = true;
          localStorage.setItem('arabizi-ctrlbs-hint', 'true');
          showToast('Tip: <kbd>Ctrl</kbd>+<kbd>⌫</kbd> deletes the entire word');
        }
      } else if (e.key !== 'Backspace') {
        backspaceCount = 0;
      }
    });

    // ── Core logic ──
    function confirmCurrentWord() {
      const arabic = currentCandidates[selectedIdx] || currentCandidates[0] || currentInput;
      invoke('record_selection', { input: currentInput, arabic });
      if (editingWordIdx >= 0) {
        committedWords[editingWordIdx] = { input: currentInput, arabic, candidates: currentCandidates };
        editingWordIdx = -1;
      } else {
        committedWords.push({ input: currentInput, arabic, candidates: currentCandidates });
      }
      inputEl.value = '';
      currentInput = '';
      currentCandidates = [];
      selectedIdx = 0;
      updateInputHint();
      renderAll();
      inputEl.focus();
    }

    window.editWord = function(idx) {
      editingWordIdx = idx;
      const w = committedWords[idx];
      inputEl.value = w.input;
      currentInput = w.input;
      currentCandidates = w.candidates;
      selectedIdx = w.candidates.indexOf(w.arabic);
      if (selectedIdx < 0) selectedIdx = 0;
      updateInputHint();
      renderAll();
      inputEl.focus();
      inputEl.select();
    };

    window.pickCandidate = function(idx) {
      selectedIdx = idx;
      confirmCurrentWord();
    };

    async function commitAll() {
      const text = committedWords.map(w => w.arabic).join(' ');
      await writeText(text);
      await getCurrentWindow().hide();
      setTimeout(() => invoke('paste_from_clipboard'), 100);
    }

    // ── Rendering ──
    let tutorialSeen = localStorage.getItem('arabizi-tutorial-seen') === 'true';
    if (tutorialSeen) inputHint.classList.add('hidden');

    function dismissTutorial() {
      if (!tutorialSeen) {
        tutorialSeen = true;
        localStorage.setItem('arabizi-tutorial-seen', 'true');
        inputHint.classList.add('hidden');
      }
    }

    function updateInputHint() {
      if (inputEl.value.length > 0) dismissTutorial();
    }

    function showView(view) {
      tipsPanel.classList.toggle('hidden', view !== 'landing');
      typingPanels.classList.toggle('hidden', view !== 'typing');
      settingsPanel.classList.toggle('hidden', view !== 'settings');
    }

    function renderAll() {
      if (settingsOpen) {
        showView('settings');
        return;
      }
      if (currentCandidates.length > 0 || committedWords.length > 0) {
        showView('typing');
        renderSuggestions();
        renderPreview();
      } else {
        showView('landing');
      }
    }

    function renderSuggestions() {
      if (currentCandidates.length === 0) {
        suggestionList.innerHTML = '';
        return;
      }
      suggestionList.innerHTML = currentCandidates.map((c, i) => `
        <div class="suggestion ${i === selectedIdx ? 'selected' : ''}" onclick="pickCandidate(${i})">
          <div class="ar">${c}</div>
        </div>
      `).join('');
      const sel = suggestionList.querySelector('.suggestion.selected');
      if (sel) sel.scrollIntoView({ block: 'nearest' });
    }

    function renderPreview() {
      const parts = [];
      for (let i = 0; i < committedWords.length; i++) {
        if (i === editingWordIdx && currentCandidates.length > 0) {
          const current = currentCandidates[selectedIdx] || currentCandidates[0];
          parts.push(`<span class="committed-word editing" onclick="editWord(${i})">${current}</span>`);
        } else {
          parts.push(`<span class="committed-word" onclick="editWord(${i})">${committedWords[i].arabic}</span>`);
        }
      }
      if (editingWordIdx < 0 && currentCandidates.length > 0) {
        const current = currentCandidates[selectedIdx] || currentCandidates[0];
        parts.push(`<span>${current}</span>`);
      }
      previewText.innerHTML = parts.join(' ');
    }

    // ── Init ──
    initAccentColor();
    applyTheme();
    renderAll();
    inputEl.focus();
  </script>
</body>
</html>
